spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: kark-profit
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Phnom_Penh
  cache:
    type: caffeine

  profiles:
    active: local

  transaction:
    default-timeout: 30
    rollback-on-commit-failure: true
  datasource:
    url: ${datasource.url}
    username: ${datasource.username}
    password: ${datasource.password}
  jpa:
    hibernate:
      ddl-auto: none   # auto create/update tables
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
mailtrap:
  token: ${mailtrap.token}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  max-http-request-header-size: 1MB
  tomcat:
    max-swallow-size: 10MB
  servlet:
    context-path: /kark-profit
