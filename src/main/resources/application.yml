spring:
  application:
    name: kark-profit
  jackson:
    property-naming-strategy: SNAKE_CASE

  profiles:
    active: local

  datasource:
    url: ${supabase_url}
    username: ${username}
    password: ${password}
  jpa:
    hibernate:
      ddl-auto: none   # auto create/update tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  servlet:
    context-path: /kark-profit

telegram:
  bot:
    token: 123
    chat-id: 123